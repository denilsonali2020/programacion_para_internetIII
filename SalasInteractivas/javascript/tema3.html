<!-- //DOM
Que es el DOM?
(Document Object Model)
es una estructura de arbol que representa el documento HTML cargado en 
el navegador. Js utiliza el DOM para alterar de forma dinamica la 
estructura, el estilo y el contenido del documento -->
<!-- document.getElementById('id_del_elemento'): Selecciona el ID
document.querySelector('.clase_o_selector'): Selecciona usando selectores CSS (muy flexible). -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team 3: Manipulacion del DOM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <div class="card p-4 shadow-sm" id="miTarjeta">
        <h2 id="tituloCard">Estado del Servidor: Desconectado</h2>
        <p id="descripcionCard">El sistema no esta respondiendo a las peticiones del cliente</p>
    </div>

    <script>
        // 1. Seleccionar los elementos del DOM
        const tarjeta = document.getElementById("miTarjeta");
        const titulo = document.getElementById("tituloCard");
        const descripcion = document.querySelector("#descripcionCard");

        // 2. Modificar contenido y estilos despues de 3 segundos(Simulacion de carga)
        setTimeout(() => {
            titulo.textContent = "Estado del Servidor: Conectado Con Exito";
            descripcion.innerHTML = "La sincronizacion con la base de datos se realizo<strong>correctamente</strong>";
            
            //Modificar clases de Bootstrap mediante JS
            tarjeta.classList.add("bg-success", "text-white");
        }, 3000);
    </script>
    
</body>
</html>
