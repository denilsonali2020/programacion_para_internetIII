<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Vehiculos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body class="bg-light">
    <div class="container mt-5">
        <div class="row">
            <div class="col-md-5">
                <div class="card shadow">
                    <h4>Registro de Vehiculos</h4>
                </div>

                <div class="card-body">
                    <form id="formVehiculo">
                        <div class="mb-3">
                            <label class="form-label">Placa</label>
                            <input type="text" class="form-control" id="placa" placeholder="ABC-1234">
                            <small id="errorPlaca" class="text-danger"></small>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Marca</label>
                            <input type="text" class="form-control" id="marca">
                            <small id="errorMarca" class="text-danger"></small>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Tipo</label>
                            <select class="form-select" id="tipo">
                                <option value="">Seleccione...</option>
                                <option>Automovil</option>
                                <option>Camioneta</option>
                                <option>Motocicleta</option>
                                <option>Camion</option>
                            </select>
                            <small id="errorTipo" class="text-danger"></small>

                        </div>
                        <div class="mb-3">
                            <label class="form-label">Año</label>
                            <input type="number" class="form-control" id="anio">
                            <small id="errorAnio" class="text-danger"></small>

                        </div>
                        <button class="btn btn-success">Registrar Vehiculo</button>

                    </form>
                </div>

            </div>
        </div>
        <div class="col-md-7">
            <div class="card shadow">
                <div class="card-header d-flex justify-content-between">
                    <h4>Vehiculos Registrados</h4>
                    <span class="badge bg-primary fs-6" id="contador">
                        0
                    </span>
                </div>
                <div class="card-body">
                    <table class="table table-bordered table-striped">
                        <thead class="table-dark">
                            <tr>
                                <th>Placa</th>
                                <th>Marca</th>
                                <th>Tipo</th>
                                <th>Año</th>
                            </tr>
                        </thead>
                        <tbody id="tablaVehiculos">

                        </tbody>
                    </table>
                    <button class="btn btn-danger" id="limpiarTabla">Vaciar Lista</button>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
