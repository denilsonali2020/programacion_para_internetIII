<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tema 1 - Sintaxis JS</title>
</head>
<body>
    <h1>Abra la consola del navegador(f12)</h1>
    <script>

        //1. Declaracion de variables
        const institucion = "Universidad";
        let estudiantesActivos = 25;
        let cursoAbierto = true;

        // Modificando variables
        estudiantesActivos = estudiantesActivos + 5;

        // 2. Arreglos y Objetos basicos
        let lenguajes = ["JavaScript", "PHP", "SQL"];
        let docente = {
            nombre: "Docente Principal",
            departamento: "Ingenieria de Sistemas"
        };

        // 3. Imprimir en consola
        console.log("Institucion:", institucion);
        console.log("Total de estudiantes:", estudiantesActivos);
        console.log("Curso disponible?:", cursoAbierto);
        console.log("Primer lenguaje:", lenguajes[0]);
        console.log("Nombre del docente:", docente.nombre);

    </script>

</body>
</html>
