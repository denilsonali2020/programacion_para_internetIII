<!doctype html>
<html lang="es" ng-app="laravel_angular">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Gestor de Tareas</title>

        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
        <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    </head>
    <body ng-controller="TodoController" class="bg-light">
        <div class="container mt-5" style="max-width: 600px">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h1
                        class="card-title text-center text-primary mb-4 font-weight-bold"
                    >
                        Mis Tareas
                    </h1>

                    <div class="input-group mb-4">
                        <input
                            type="text"
                            ng-model="nuevaTarea"
                            class="form-control"
                            placeholder="Escribe una nueva tarea"
                            aria-label="Nueva tarea"
                        />
                        <button
                            class="btn btn-primary"
                            type="button"
                            ng-click="agregarTarea()"
                        >
                            Agregar Tarea
                        </button>
                    </div>

                    <div
                        class="alert alert-info text-center"
                        ng-if="tareas.length === 0"
                    >
                        No hay tareas pendientes.
                    </div>

                    <ul class="list-group">
                        <li
                            class="list-group-item d-flex justify-content-between align-items-center animate-repeat"
                            ng-repeat="tarea in tareas"
                        >
                            <span class="fs-5">{{ tarea.titulo }}</span>
                        </li>
                    </ul>
                </div>
            </div>
        </div>

        <script>
            // iniciamos la aplicacion de angular con esto, el arreglo vacio es para decirle que dependencias seran
            // utilizadas en este caso va vacio porque no se requiere nada especial
            var app = angular.module("laravel_angular", []);

            // iniciamos el controlador con sus servicios nativos scrope y http
            app.controller("TodoController", function ($scope, $http) {
                //iniciamos el arreglo de tareas
                $scope.tareas = [];
                $scope.nuevaTarea = "";

                // metodo get
                $scope.obtenerTareas = function () {
                    $http.get("/api/tareas").then(function (response) {
                        $scope.tareas = response.data;
                    });
                };

                // metodo post
                $scope.agregarTarea = function () {
                    // validamos que la tarea no venga vacia
                    if (!$scope.nuevaTarea) return;

                    $http
                        .post("/api/tareas", { titulo: $scope.nuevaTarea })
                        .then(function (response) {
                            $scope.tareas.push(response.data);
                            $scope.nuevaTarea = "";
                        });
                };

                $scope.obtenerTareas();
            });
        </script>
    </body>
</html>
